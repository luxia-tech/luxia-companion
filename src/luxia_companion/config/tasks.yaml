answer_partner_query:
  description: >
    O parceiro comercial enviou a seguinte pergunta via WhatsApp:

    "{user_query}"

    Sua tarefa:
    1. Analise a pergunta do parceiro e identifique o que ele precisa saber
    2. Use a ferramenta de busca na base de conhecimento para encontrar
       informações relevantes nos documentos de referência
    3. Elabore uma resposta clara, direta e precisa em português brasileiro
    4. Se a informação não estiver na base de conhecimento, informe que não
       possui essa informação e sugira que o parceiro entre em contato com
       o suporte da Luxia

    Regras:
    - Responda SEMPRE em português brasileiro
    - Seja objetivo — parceiros estão no WhatsApp, preferem respostas concisas
    - Cite a fonte quando relevante (ex: "conforme o contrato padrão...")
    - Nunca invente informações — use apenas o que está na base de conhecimento
    - Limite a resposta a no máximo 1500 caracteres
  expected_output: >
    Uma resposta em português brasileiro, clara e concisa, que responda
    diretamente à pergunta do parceiro. A resposta deve ser fundamentada nos
    documentos da base de conhecimento quando aplicável.
  agent: knowledge_assistant
